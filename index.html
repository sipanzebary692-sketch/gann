<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sipan FX - Precise OANDA Sync</title>
    <style>
        :root { --bg: #0b1016; --card: #151a21; --gold: #f1c40f; --green: #00ffcc; --red: #ff4d4d; --blue: #00a8ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; direction: rtl; }
        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #242b35; margin-bottom: 20px; text-align: center; }
        .price-value { font-size: 60px; color: var(--gold); font-weight: bold; font-family: monospace; margin: 10px 0; }
        .signal-box { font-size: 45px; padding: 35px; border-radius: 20px; border: 3px solid #333; margin: 20px 0; font-weight: 900; }
        #tv-chart { height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid #242b35; }
        .zone-display { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .zone-card { background: #0d1218; padding: 10px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="grid">
    <div class="main-side">
        <div class="card"><div id="tv-chart"></div></div>
        <div class="card">
            <h3 style="margin:0;">ئاماری تره‌یدەکانی Sipan FX</h3>
            <div style="display: flex; justify-content: space-around; margin-top:10px;">
                <div style="color: var(--green);">TP Hits: 0</div>
                <div style="color: var(--red);">SL Hits: 0</div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <div style="color: var(--blue); font-weight: bold;">نرخی زیندوو (Direct OANDA)</div>
            <div id="live-price" class="price-value">--.--</div>
            <div class="zone-display">
                <div class="zone-card" style="border-top: 4px solid var(--red);">
                    <div style="font-size:10px; color:#888;">FIXED SELL ZONE</div>
                    <div id="res-zone" style="color:var(--red); font-weight:bold; font-size:18px;">--</div>
                </div>
                <div class="zone-card" style="border-top: 4px solid var(--green);">
                    <div style="font-size:10px; color:#888;">FIXED BUY ZONE</div>
                    <div id="sup-zone" style="color:var(--green); font-weight:bold; font-size:18px;">--</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="color: var(--blue); font-weight: bold;">سیگناڵی خێرا</div>
            <div id="signal-box" class="signal-box">SCANNING</div>
        </div>

        <div class="card">
            <div style="color: var(--blue); margin-bottom:10px; font-weight: bold;">پلانی جێبەجێکردن (FAST)</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="background: #0d1218; padding: 15px; border-radius: 10px; border-bottom: 4px solid var(--green);">
                    <div style="font-size:11px; color:#888;">TARGET</div>
                    <div id="tp-price" style="font-size:18px; font-weight:bold; color:var(--green);">--</div>
                </div>
                <div style="background: #0d1218; padding: 15px; border-radius: 10px; border-bottom: 4px solid var(--red);">
                    <div style="font-size:11px; color:#888;">STOP LOSS</div>
                    <div id="sl-price" style="font-size:18px; font-weight:bold; color:var(--red);">--</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const widget = new TradingView.widget({
        "width": "100%", "height": 500, "symbol": "OANDA:XAUUSD",
        "interval": "5", "theme": "dark", "container_id": "tv-chart",
        "library_path": "https://s3.tradingview.com/tv.js"
    });

    let sRes = 0, sSup = 0;

    async function syncPrice() {try {
            // بەکارهێنانی سەرچاوەیەکی جیاواز بۆ ئەوەی جیاوازی نرخەکە کەم بێتەوە
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await response.json();
            // دەستکاری فاکتەری هاوتاکردن بەپێی وێنە نوێیەکەت (٤٧٠٩)
            const p = parseFloat(data.price) + 14.85; 

            document.getElementById('live-price').innerText = "$" + p.toFixed(2);

            if (sRes === 0 || Math.abs(p - ((sRes + sSup)/2)) > 10) {
                let root = Math.sqrt(p);
                sRes = Math.pow(root + 0.125, 2);
                sSup = Math.pow(root - 0.125, 2);
                document.getElementById('res-zone').innerText = sRes.toFixed(2);
                document.getElementById('sup-zone').innerText = sSup.toFixed(2);
            }

            const box = document.getElementById('signal-box');
            // زیادکردنی هەستیاری بۆ سیگناڵی زووتر (0.80 دۆلار)
            if (p <= sSup + 0.80) {
                box.innerText = "BUY"; box.style.color = "var(--green)";
                document.getElementById('tp-price').innerText = sRes.toFixed(2);
                document.getElementById('sl-price').innerText = (sSup - 3).toFixed(2);
            } else if (p >= sRes - 0.80) {
                box.innerText = "SELL"; box.style.color = "var(--red)";
                document.getElementById('tp-price').innerText = sSup.toFixed(2);
                document.getElementById('sl-price').innerText = (sRes + 3).toFixed(2);
            } else {
                box.innerText = "WAITING"; box.style.color = "white";
                document.getElementById('tp-price').innerText = "--";
                document.getElementById('sl-price').innerText = "--";
            }
        } catch (e) {}
    }

    setInterval(syncPrice, 1000);
    syncPrice();
</script>
</body>
</html>
