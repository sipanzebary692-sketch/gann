<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gann Master Pro - Sipan FX Dual Time</title>
    <style>
        :root { --bg: #0b1016; --card: #151a21; --gold: #f1c40f; --green: #00ffcc; --red: #ff4d4d; --blue: #00a8ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; direction: rtl; }
        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #242b35; margin-bottom: 20px; text-align: center; }
        .price-value { font-size: 60px; color: var(--gold); font-weight: bold; font-family: monospace; margin: 10px 0; }
        .signal-box { font-size: 45px; padding: 35px; border-radius: 20px; border: 3px solid #333; margin: 20px 0; font-weight: 900; }
        #tv-chart { height: 550px; border-radius: 12px; overflow: hidden; border: 1px solid #242b35; }
        .tf-badge { background: var(--blue); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="grid">
    <div class="main-side">
        <div class="card">
            <div class="tf-badge">CHART: 15M | DATA: 5M SYNC</div>
            <div id="tv-chart"></div>
        </div>
        <div class="card">
            <h3 style="margin:0;">ئاماری تره‌یدەکانی Sipan FX</h3>
            <div style="display: flex; justify-content: space-around; margin-top:10px;">
                <div style="color: var(--green);">TP Hits: <span id="tp-count" style="font-size:30px; font-weight:bold;">0</span></div>
                <div style="color: var(--red);">SL Hits: <span id="sl-count" style="font-size:30px; font-weight:bold;">0</span></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <div style="color: var(--blue); font-weight: bold;">نرخی ئێستا (OANDA SYNC)</div>
            <div id="live-price" class="price-value">--.--</div>
            <div style="font-size:12px; color:var(--green);">Optimized for 5m & 15m ✅</div>
        </div>

        <div class="card">
            <div style="color: var(--blue); font-weight: bold;">هێزی سیگناڵ (Gann Analysis)</div>
            <div id="signal-box" class="signal-box">NEUTRAL</div>
        </div>

        <div class="card">
            <div style="color: var(--blue); margin-bottom:10px; font-weight: bold;">پلانی تره‌ید (Scalping & Intraday)</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="background: #0d1218; padding: 15px; border-radius: 10px; border-bottom: 4px solid var(--green);">
                    <div style="font-size:11px; color:#888;">TARGET (TP)</div>
                    <div id="tp-price" style="font-size:20px; font-weight:bold; color:var(--green);">--</div>
                </div>
                <div style="background: #0d1218; padding: 15px; border-radius: 10px; border-bottom: 4px solid var(--red);">
                    <div style="font-size:11px; color:#888;">STOP LOSS (SL)</div>
                    <div id="sl-price" style="font-size:20px; font-weight:bold; color:var(--red);">--</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // جێگیرکردنی چارت لەسەر 15m بۆ ئاڕاستەی گشتی
    new TradingView.widget({
        "width": "100%", "height": 550, "symbol": "OANDA:XAUUSD",
        "interval": "15", "theme": "dark", "container_id": "tv-chart",
        "locale": "en", "style": "1"
    });

    async function getPrice() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await response.json();
            // پاراستنی هاوتایی نرخ لەگەڵ ئۆندا
            const currentGoldPrice = parseFloat(data.price) + 14.70; 
            document.getElementById('live-price').innerText = "$" + currentGoldPrice.toFixed(2);
            updateGann(currentGoldPrice);
        } catch (e) { console.log("Re-syncing..."); }
    }

    function updateGann(p) {
        let root = Math.sqrt(p);
        // بەکارهێنانی فاکتەری 0.0625 بۆ 5m و 0.125 بۆ 15m
        let res = Math.pow(root + 0.125, 2);
        let sup = Math.pow(root - 0.125, 2);
        
        const box = document.getElementById('signal-box');

        // سیگناڵەکە هەستیارتر کراوە بۆ ئەوەی لە 5m زووتر کار بکات
        if (p <= sup + 0.4) {
            box.innerText = "BUY"; box.style.color = "var(--green)"; box.style.borderColor = "var(--green)";
            document.getElementById('tp-price').innerText = res.toFixed(2);
            document.getElementById('sl-price').innerText = (sup - 3).toFixed(2);
        } else if (p >= res - 0.4) {
            box.innerText = "SELL"; box.style.color = "var(--red)"; box.style.borderColor = "var(--red)";
            document.getElementById('tp-price').innerText = sup.toFixed(2);
            document.getElementById('sl-price').innerText = (res + 3).toFixed(2);
        } else {
            box.innerText = "NEUTRAL"; box.style.color = "white"; box.style.borderColor = "#333";
            document.getElementById('tp-price').innerText = "--"; document.getElementById('sl-price').innerText = "--";
        }
    }

    setInterval(getPrice, 1000);
    getPrice();
</script>
</body>
</html>
