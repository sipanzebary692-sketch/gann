<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Gann Pro - News & Strength Filter</title>
    <style>
        :root { --bg: #020408; --card: #0a0d14; --primary: #00a8ff; --gold: #f1c40f; --green: #00d2d3; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; direction: rtl; }
        .grid { display: grid; grid-template-columns: 1fr 400px; gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #1e272e; margin-bottom: 15px; position: relative; }
        
        /* بەشی هێزی سیگناڵ */
        .strength-container { margin: 15px 0; background: #111; border-radius: 20px; height: 25px; overflow: hidden; border: 1px solid #333; }
        .strength-bar { height: 100%; width: 0%; transition: 0.5s; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); }
        
        /* ئاگاداری هەواڵ */
        .news-flash { background: rgba(241, 196, 15, 0.1); border: 1px solid var(--gold); padding: 10px; border-radius: 8px; font-size: 13px; color: var(--gold); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .price-big { font-size: 50px; text-align: center; color: var(--gold); font-weight: bold; }
        .signal-banner { font-size: 32px; text-align: center; padding: 25px; border-radius: 15px; border: 3px solid #333; transition: 0.4s; }
        .stats { display: flex; justify-content: space-around; text-align: center; }
        .stat-val { font-size: 25px; font-weight: bold; }
    </style>
</head>
<body>

<div class="grid">
    <div class="main-column">
        <div class="news-flash">
            <span>⚠️</span>
            <marquee id="news-text">ئاگاداری: سبەی هەواڵی CPI بڵاو دەبێتەوە، لە کاتی هەواڵەکان تره‌ید مەکە...</marquee>
        </div>

        <div class="card">
            <h2>چارتی زێڕ (XAUUSD)</h2>
            <div id="tv_main_chart" style="height: 480px;"></div>
        </div>
        
        <div class="card">
            <h2>ئاماری تره‌ید (TP/SL)</h2>
            <div class="stats">
                <div style="color: var(--green);">تارگێت: <div id="tp-count" class="stat-val">0</div></div>
                <div style="color: var(--red);">ستۆپ: <div id="sl-count" class="stat-val">0</div></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <h2>نرخی ڕاستەقینە</h2>
            <div id="price" class="price-big">LOADING</div>
        </div>

        <div class="card">
            <h2 style="color:var(--gold);">هێزی سیگناڵ (Strength)</h2>
            <div class="strength-container">
                <div id="strength-bar" class="strength-bar"></div>
            </div>
            <div id="strength-text" style="text-align:center; font-size:12px;">Scanning Market...</div>
        </div>

        <div id="main-signal" class="signal-banner">NEUTRAL</div>

        <div class="card">
            <h2 style="color:var(--primary);">پلانی تره‌ید</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div style="text-align:center; padding:10px; background:#111; border-radius:8px;">
                    <div style="font-size:11px; color:#888;">TP</div>
                    <div id="tp-val" style="color:var(--green); font-weight:bold;">--</div>
                </div>
                <div style="text-align:center; padding:10px; background:#111; border-radius:8px;">
                    <div style="font-size:11px; color:#888;">SL</div>
                    <div id="sl-val" style="color:var(--red); font-weight:bold;">--</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    new TradingView.widget({ "width": "100%", "height": 480, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark", "container_id": "tv_main_chart" });

    let tp = 0, sl = 0, activeTrade = null;
    async function fetchPrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await res.json();
            processLogic(parseFloat(data.price));
        } catch(e) {}
    }

    function processLogic(price) {
        document.getElementById('price').innerText = "$" + price.toFixed(2);
        
        let root = Math.sqrt(price);
        let gRes = Math.pow(root + 0.125, 2);
        let gSupp = Math.pow(root - 0.125, 2);

        // حیسابکردنی هێزی سیگناڵ (0-100%)
        let strength = 0;
        let signal = "NEUTRAL";

        if (price <= gSupp + 0.5) { // Gann Buy Zone
            strength += 40;
            if (price <= gSupp + 0.2) strength += 30; // Strong Gann
            // لێرەدا دەتوانیت مەرجی تری بۆ زیاد بکەیت
            signal = "BUY";
        } else if (price >= gRes - 0.5) { // Gann Sell Zone
            strength += 40;
            if (price >= gRes - 0.2) strength += 30;
            signal = "SELL";
        }

        // زیادکردنی هێز بەپێی کات (Astro)
        if (new Date().getDate() % 4 === 0) strength += 30; 

        updateStrengthUI(strength, signal);

        if (!activeTrade) {
            if (strength >= 70) {
                executeTrade(signal, (signal==='BUY'?gRes:gSupp), (signal==='BUY'?gSupp-4:gRes+4));
            } else {
                document.getElementById('main-signal').innerText = "WAITING...";
                document.getElementById('main-signal').style.borderColor = "#333";
            }
        } else {
            checkExit(price);
        }
    }

    function updateStrengthUI(val, type) {
        const bar = document.getElementById('strength-bar');
        const text = document.getElementById('strength-text');
        bar.style.width = val + "%";
        text.innerText = "هێزی سیگناڵ: " + val + "%";
        
        if (val < 40) bar.style.background = "var(--red)";
        else if (val < 70) bar.style.background = "var(--gold)";
        else bar.style.background = "var(--green)";
    }

    function executeTrade(type, target, stop) {
        activeTrade = type;
        const banner = document.getElementById('main-signal');
        banner.innerText = type + " ACTIVE";
        banner.style.borderColor = (type === 'BUY') ? "var(--green)" : "var(--red)";
        banner.style.color = (type === 'BUY') ? "var(--green)" : "var(--red)";
        document.getElementById('tp-val').innerText = target.toFixed(2);
        document.getElementById('sl-val').innerText = stop.toFixed(2);
    }

    function checkExit(price) {
        let target = parseFloat(document.getElementById('tp-val').innerText);
        let stop = parseFloat(document.getElementById('sl-val').innerText);
        if (activeTrade === 'BUY') {
            if (price >= target) { tp++; activeTrade = null; }
            else if (price <= stop) { sl++; activeTrade = null; }
        } else if (activeTrade === 'SELL') {
            if (price <= target) { tp++; activeTrade = null; }
            else if (price >= stop) { sl++; activeTrade = null; }
        }
        document.getElementById('tp-count').innerText = tp;
        document.getElementById('sl-count').innerText = sl;
    }

    setInterval(fetchPrice, 3000);
</script>
</body>
</html>
